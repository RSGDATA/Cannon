name: PR checks

# Runs on every pull request to main. This is the required check for branch
# protection. It type-checks and builds the React web app.
on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  web:
    name: Web (lint, typecheck, build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install & build
        working-directory: web
        run: |
          npm ci
          npm run lint --if-present
          npm run build
