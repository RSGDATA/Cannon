name: Deploy to Firebase Hosting

# Deploys the web app to Firebase Hosting (live channel) on every push to main.
# Because main is protected, that means "deploy after an approved PR is merged".
on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: deploy-hosting
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & deploy (Firebase Hosting)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build web
        working-directory: web
        # Supabase URL + anon key are public (anon key is RLS-gated and ships to
        # the browser anyway); stored as repo Variables, injected at build time.
        env:
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY }}
        run: |
          npm ci
          npm run build

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: cannon-music-prod
